<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Reporting HUB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --nm-bg:    #1d2130;
      --nm-dark:  #141720;
      --nm-light: #272c40;
      --accent:   #aaeb3d;
    }

    html, body {
      height: 100%;
      font-family: 'Plus Jakarta Sans', -apple-system, sans-serif;
      font-size: 14px;
      overflow: hidden;
    }

    body {
      display: flex; align-items: center; justify-content: center;
      background: #0a0f1a;
    }

    /* ── Neumorphic Card ─────────────────────────────────────────── */
    .card {
      position: relative; z-index: 1;
      background: var(--nm-bg);
      border-radius: 28px;
      padding: 52px 48px 44px;
      width: 420px; max-width: 95vw;
      box-shadow:
        16px 16px 36px var(--nm-dark),
        -16px -16px 36px var(--nm-light);
      display: flex; flex-direction: column; gap: 26px;
      animation: cardIn .5s cubic-bezier(0.22,1,0.36,1);
    }
    @keyframes cardIn { from { opacity: 0; transform: translateY(28px) scale(0.96); } to { opacity: 1; transform: none; } }

    .card::before {
      content: '';
      position: absolute; top: 0; left: 18%; right: 18%; height: 2px;
      background: linear-gradient(90deg, transparent, rgba(168,230,61,0.65), transparent);
      border-radius: 999px;
    }

    /* ── Logo / Badge ────────────────────────────────────────────── */
    .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 16px; }
    .logo-panel {
      background: var(--nm-bg);
      border-radius: 18px; padding: 14px 28px;
      box-shadow: inset 5px 5px 12px var(--nm-dark), inset -5px -5px 12px var(--nm-light);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-wrap img { height: 44px; width: auto; object-fit: contain; mix-blend-mode: screen; }
    .admin-badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: var(--nm-bg); border-radius: 999px; padding: 5px 16px;
      font-size: 12px; font-weight: 700; color: var(--accent); letter-spacing: 0.05em;
      box-shadow: 4px 4px 10px var(--nm-dark), -4px -4px 10px var(--nm-light);
    }

    .subtitle { color: rgba(255,255,255,0.38); font-size: 13px; text-align: center; margin-top: -10px; }

    /* ── Form ────────────────────────────────────────────────────── */
    .field { display: flex; flex-direction: column; gap: 8px; }
    .field label {
      font-size: 11px; font-weight: 700; color: rgba(255,255,255,0.38);
      text-transform: uppercase; letter-spacing: .09em; padding-left: 4px;
    }
    .field input {
      background: var(--nm-bg); border: none; border-radius: 14px; padding: 14px 18px;
      color: #fff; font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif;
      outline: none; width: 100%; letter-spacing: 0.22em;
      box-shadow: inset 5px 5px 12px var(--nm-dark), inset -5px -5px 12px var(--nm-light);
      transition: box-shadow .25s ease;
    }
    .field input::placeholder { color: rgba(255,255,255,0.18); letter-spacing: 0; }
    .field input:focus {
      box-shadow: inset 6px 6px 14px var(--nm-dark), inset -6px -6px 14px var(--nm-light),
                  0 0 0 2px rgba(168,230,61,0.30);
    }

    .error { color: #ff7070; font-size: 12px; min-height: 16px; text-align: center; font-weight: 600; }

    /* ── Button ──────────────────────────────────────────────────── */
    .btn {
      background: linear-gradient(145deg, #b8f040 0%, #7ec918 100%);
      color: #162400; font-weight: 800; border: none; border-radius: 14px;
      padding: 15px; font-size: 15px; cursor: pointer;
      font-family: 'Plus Jakarta Sans', sans-serif;
      box-shadow: 6px 6px 14px var(--nm-dark), -6px -6px 14px var(--nm-light);
      transition: box-shadow .2s ease, transform .15s ease, opacity .15s;
      width: 100%;
    }
    .btn:hover:not(:disabled) {
      box-shadow: 8px 8px 18px var(--nm-dark), -8px -8px 18px var(--nm-light);
      transform: translateY(-1px);
    }
    .btn:active:not(:disabled) {
      box-shadow: inset 5px 5px 12px rgba(0,0,0,0.35), inset -5px -5px 12px rgba(255,255,255,0.06);
      transform: translateY(0);
    }
    .btn:disabled { opacity: 0.55; cursor: default; }

    .back-link { text-align: center; font-size: 12px; color: rgba(255,255,255,0.28); }
    .back-link a { color: rgba(168,230,61,0.65); text-decoration: none; transition: color .15s; }
    .back-link a:hover { color: var(--accent); }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-panel">
        <img id="admin-logo" src="/images/logo-dark.png" alt="Logo" />
      </div>
      <span class="admin-badge">👑 Admin Access</span>
    </div>

    <p class="subtitle">Enter your admin PIN to continue</p>

    <div class="field">
      <label>Admin PIN</label>
      <input type="password" id="pin-input" placeholder="••••" maxlength="20" autocomplete="off" autofocus />
    </div>

    <div class="error" id="error-msg"></div>

    <button class="btn" id="login-btn">Enter Admin →</button>

    <p class="back-link"><a href="/">← Back to login</a></p>
  </div>

  <script src="/js/shader-hero.js"></script>
  <script>
    document.querySelectorAll('.blob')
      .forEach(function(el){ el.style.display='none'; });
    ShaderHero.init();
  </script>
  <script>
    const pinInput = document.getElementById('pin-input');
    const loginBtn = document.getElementById('login-btn');
    const errorMsg = document.getElementById('error-msg');

    async function attemptLogin() {
      const pin = pinInput.value.trim();
      if (!pin) { errorMsg.textContent = 'Enter your PIN.'; return; }

      loginBtn.textContent = '…';
      loginBtn.disabled = true;
      errorMsg.textContent = '';

      try {
        const res = await fetch('/api/config', { headers: { 'X-Admin-PIN': pin } });
        if (res.ok) {
          sessionStorage.setItem('rh_role_type', 'admin');
          sessionStorage.setItem('rh_role_name', 'Admin');
          sessionStorage.setItem('rh_pin', pin);
          window.location.href = '/';
        } else {
          errorMsg.textContent = 'Incorrect PIN. Try again.';
          pinInput.value = '';
          pinInput.focus();
        }
      } catch {
        errorMsg.textContent = 'Connection error. Is the server running?';
      } finally {
        loginBtn.textContent = 'Enter Admin →';
        loginBtn.disabled = false;
      }
    }

    loginBtn.addEventListener('click', attemptLogin);
    pinInput.addEventListener('keydown', e => { if (e.key === 'Enter') attemptLogin(); });

    // Apply custom branding (logo + accent color)
    (async () => {
      try {
        const cfg = await fetch('/api/config/public').then(r => r.json());
        if (cfg.accentColor) {
          document.documentElement.style.setProperty('--accent', cfg.accentColor);
        }
        if (cfg.brandLogoDark) {
          document.getElementById('admin-logo').src = cfg.brandLogoDark;
        }
      } catch {}
    })();
  </script>
</body>
</html>
